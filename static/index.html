<!DOCTYPE html>
<html>
<head>
    <title>Sudoku Game</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
        }

        #grid {
            display: grid;
            grid-template-columns: repeat(9, 50px);
            grid-template-rows: repeat(9, 50px);
            gap: 0;
            margin: 20px auto;
            width: 450px;
        }

        .cell {
            border: 1px solid black;
            text-align: center;
            font-size: 20px;
        }

        .cell input {
            width: 100%;
            height: 100%;
            text-align: center;
            font-size: 20px;
            border: none;
        }

        .thick-right {
            border-right: 3px solid black;
        }

        .thick-bottom {
            border-bottom: 3px solid black;
        }

        button {
            margin: 10px;
            padding: 10px;
        }

        #result {
            font-size: 20px;
            margin-top: 15px;
        }
    </style>
</head>
<body>

<h1>Sudoku</h1>
<button onclick="createPuzzle()" type="button">Create Puzzle</button>
<button onclick="submitPuzzle()" type="button">Submit</button>
<button onclick="showSolution()" type="button">Show answer</button>

<div id="grid"></div>

<div id="result"></div>

<script src="/static/index.js"></script>

</body>
</html>
